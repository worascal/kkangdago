<style>
:root{--bg:#000;--surface:#0e0e0e;--surface2:#181818;--accent:#00d4b8;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--text:#e2e8f0;--muted:#6a8888;--hot:#ef4444;--warm:#f59e0b;--mild:#22c55e;--cold:#555}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;min-height:100vh}
a{color:inherit;text-decoration:none}
.header{background:linear-gradient(135deg,#000 0%,#060606 60%,#000 100%);padding:24px 20px 18px;border-bottom:1px solid #1a1a1a}
.header-inner{max-width:900px;margin:0 auto}
.logo{font-size:22px;font-weight:800;color:#fff;letter-spacing:-1px}
.logo span{color:var(--accent)}
.kr-badge{background:rgba(0,212,184,0.15);border:1px solid rgba(0,212,184,0.3);color:var(--accent);font-size:10px;font-weight:800;padding:2px 6px;border-radius:4px;letter-spacing:1px;margin-left:6px;align-self:center}
.date-badge{background:var(--accent);color:#000;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;display:inline-block;margin-left:10px}
.session-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;display:inline-block;margin-left:6px}
.session-badge.premarket{background:rgba(0,212,184,0.15);color:var(--accent);border:1px solid rgba(0,212,184,0.3)}
.session-badge.close{background:rgba(245,158,11,0.15);color:var(--yellow);border:1px solid rgba(245,158,11,0.3)}
.session-badge.weekend{background:rgba(168,85,247,0.15);color:#c084fc;border:1px solid rgba(168,85,247,0.3)}
.session-badge.open{background:rgba(59,130,246,0.15);color:#60a5fa;border:1px solid rgba(59,130,246,0.3)}
.session-badge.afternoon{background:rgba(251,146,60,0.15);color:#fb923c;border:1px solid rgba(251,146,60,0.3)}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.chip{background:var(--surface2);border:1px solid #222;border-radius:6px;padding:4px 12px;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px}
.chip .dot{width:7px;height:7px;border-radius:50%}
.chip.green .dot{background:var(--green)}
.chip.red .dot{background:var(--red)}
.chip.yellow .dot{background:var(--yellow)}
.chip.blue .dot{background:var(--accent)}
.date-nav{margin-top:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;border-top:1px solid #1a1a1a;padding-top:12px}
.date-nav-label{font-size:11px;color:var(--muted);white-space:nowrap}
.date-pills{display:flex;gap:5px;flex-wrap:wrap}
.date-pill{background:var(--surface2);border:1px solid #222;border-radius:5px;padding:3px 10px;font-size:12px;color:var(--muted);cursor:pointer;text-decoration:none;transition:all .15s}
.date-pill:hover{background:#202020;color:var(--text)}
.date-pill.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:600}
.main{max-width:900px;margin:0 auto;padding:20px}
.summary-card{background:linear-gradient(135deg,#091414,#0e0e0e);border:1px solid #1e3030;border-radius:12px;padding:18px 20px;margin-bottom:24px}
.summary-card h2{font-size:13px;color:var(--accent);font-weight:700;margin-bottom:8px;letter-spacing:1px}
.summary-card p{font-size:14px;line-height:1.7;color:var(--text)}
.section-header{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.3px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-header::after{content:'';flex:1;height:1px;background:#1a1a1a}
.us-card{background:var(--surface);border:1px solid #1a1a1a;border-radius:12px;padding:16px 18px;margin-bottom:24px}
.us-indices{display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap}
.us-index{background:var(--surface2);border-radius:8px;padding:8px 14px;font-size:13px}
.us-index .name{color:var(--muted);font-size:11px;margin-bottom:2px}
.us-index .val{font-weight:700}
.us-index .val.up{color:var(--green)}
.us-index .val.down{color:var(--red)}
.us-index .val.flat{color:var(--muted)}
.us-sectors{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.us-sector{background:var(--surface2);border-radius:6px;padding:5px 12px;font-size:12px;display:flex;align-items:center;gap:5px}
.us-sector .arrow{font-size:11px}
.us-sector.up .arrow{color:var(--green)}
.us-sector.down .arrow{color:var(--red)}
.us-stocks{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.us-stock{background:var(--surface2);border:1px solid #222;border-radius:6px;padding:5px 12px;font-size:12px}
.us-stock .change{font-weight:700}
.us-stock .change.up{color:var(--green)}
.us-stock .change.down{color:var(--red)}
.kr-links{border-top:1px solid #1a1a1a;padding-top:10px}
.kr-link-item{font-size:12px;color:var(--muted);margin-bottom:5px;padding-left:10px;border-left:2px solid var(--accent)}
.themes-list{display:flex;flex-direction:column;margin-bottom:28px;border:1px solid #1a1a1a;border-radius:10px;overflow:hidden}
.theme-row{display:flex;align-items:flex-start;gap:14px;padding:10px 14px;border-bottom:1px solid #141414;border-left:3px solid #1a1a1a}
.theme-row:last-child{border-bottom:none}
.theme-row.hot{border-left-color:var(--hot)}
.theme-row.warm{border-left-color:var(--warm)}
.theme-row.mild{border-left-color:var(--mild)}
.theme-row.cold{border-left-color:#222;opacity:.5}
.theme-row-left{width:165px;flex-shrink:0;display:flex;flex-direction:column;gap:4px}
.theme-row-name{font-size:12px;font-weight:700;color:var(--text);line-height:1.35}
.theme-row-sub{font-size:10px;color:var(--muted);line-height:1.2}
.theme-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:.5px;align-self:flex-start}
.hot .theme-tag{background:rgba(239,68,68,.15);color:var(--hot)}
.warm .theme-tag{background:rgba(245,158,11,.15);color:var(--warm)}
.mild .theme-tag{background:rgba(34,197,94,.15);color:var(--mild)}
.cold .theme-tag{background:rgba(85,85,85,.2);color:#777}
.theme-row-right{flex:1;min-width:0}
.theme-row-reason{font-size:12px;color:var(--muted);line-height:1.5}
.theme-row-stocks{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.stock-tag{background:var(--surface2);border:1px solid #222;border-radius:4px;font-size:11px;padding:2px 8px;color:var(--text);text-decoration:none;display:inline-block}
a.stock-tag:hover{color:var(--accent);border-color:#444}
.news-list{background:var(--surface);border:1px solid #1a1a1a;border-radius:10px;overflow:hidden;margin-bottom:28px}
.news-item{padding:12px 16px;border-bottom:1px solid #141414;display:flex;align-items:flex-start;gap:10px}
.news-item:last-child{border-bottom:none}
.news-item:hover{background:rgba(0,212,184,.04)}
.news-num{font-size:12px;color:var(--muted);width:20px;flex-shrink:0;padding-top:2px}
.news-body{flex:1}
.news-title{font-size:13px;color:var(--text);line-height:1.4}
.news-title a{color:var(--text)}
.news-title a:hover{color:var(--accent)}
.news-meta{display:flex;align-items:center;gap:8px;margin-top:4px;flex-wrap:wrap}
.news-tag{font-size:10px;padding:1px 6px;border-radius:3px;background:rgba(0,212,184,.15);color:var(--accent)}
.news-time{font-size:11px;color:var(--muted)}
.outlook-card{background:var(--surface);border:1px solid #1a1a1a;border-radius:10px;padding:16px 18px;margin-bottom:24px}
.outlook-text{font-size:14px;line-height:1.7;color:var(--text);margin-bottom:12px}
.risks{display:flex;flex-wrap:wrap;gap:8px}
.risk-item{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#f87171;font-size:12px;padding:4px 12px;border-radius:20px}
.disclaimer{background:var(--surface);border:1px solid #1a1a1a;border-radius:8px;padding:12px 16px;margin-bottom:20px;font-size:11px;color:var(--muted);line-height:1.6}
.footer{text-align:center;padding:16px;font-size:11px;color:#333;border-top:1px solid #141414}
.loading{text-align:center;padding:60px 20px;color:var(--muted);font-size:15px}
.loading .spinner{width:32px;height:32px;border:3px solid #1a1a1a;border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:10px;padding:20px;margin:40px auto;max-width:500px;text-align:center;color:#f87171}
.themes-more-btn{background:var(--surface2);border:1px solid #2a2a2a;border-radius:8px;padding:9px 20px;font-size:12px;color:var(--muted);cursor:pointer;width:100%;margin-bottom:12px;transition:all .15s;text-align:center}
.themes-more-btn:hover{background:#202020;color:var(--text);border-color:#333}
.cold-stripybackground:rgba(239,68,68,.05);border:1px solid rgba(239,68,68,.15);border-left:3px solid rgba(239,68,68,.4);border-radius:8px;padding:10px 14px;margin-bottom:28px}
.cold-strip-label{font-size:11px;font-weight:700;color:#f87171;letter-spacing:.5px;margin-bottom:7px}
.cold-strip-items{display:flex;flex-wrap:wrap;gap:6px}
.cold-chip{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);border-radius:5px;padding:3px 10px;font-size:12px;color:#f87171}
.cold-chip-reason{color:rgba(248,113,113,.6);font-size:11px}
@media(max-width:600px){.us-indices{gap:8px}}
.date-badge{cursor:pointer;transition:opacity .15s;user-select:none}
.date-badge:hover{opacity:.8}
.cal-popup{position:absolute;top:calc(100% + 8px);left:-10px;z-index:200;background:#111;border:1px solid #2a2a2a;border-radius:12px;padding:16px;width:280px;box-shadow:0 8px 32px rgba(0,0,0,.8);display:none}
.cal-popup.open{display:block}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-hdr>span{font-size:13px;font-weight:700;color:var(--text)}
.cal-nav{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:2px 8px;border-radius:6px;line-height:1}
.cal-nav:hover{color:var(--text);background:#1a1a1a}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
.cal-dow{text-align:center;font-size:10px;color:var(--muted);padding:4px 0;font-weight:600}
.cal-day{text-align:center;padding:5px 2px;font-size:12px;border-radius:6px;color:#2a2a2a}
.cal-day.avail{color:var(--muted);cursor:pointer;background:#1a1a1a}
.cal-day.avail:hover,.cal-day.active{background:var(--accent);color:#000;font-weight:700}
.cal-day.today{outline:1px solid #444}
.cal-sessions{display:flex;gap:4px;flex-wrap:wrap;margin-top:10px;padding-top:10px;border-top:1px solid #1a1a1a}
.cal-session-btn{font-size:11px;padding:3px 10px;border-radius:5px;background:#1a1a1a;border:1px solid #2a2a2a;color:var(--muted);cursor:pointer}
.cal-session-btn:hover{color:var(--accent);border-color:var(--accent)}
</style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <div style="display:flex;align-items:center;flex-wrap:wrap;gap:6px;position:relative">
      <span class="logo">Daily <span>kkangdago</span></span><span class="kr-badge">KR</span>
      <span id="dateBadge" class="date-badge" style="display:none" onclick="toggleCal(event)"></span>
      <span id="sessionBadge" class="session-badge" style="display:none"></span>
      <div id="calPopup" class="cal-popup"></div>
    </div>
    <div id="chipsRow" class="chips"></div>
    
  </div>
</div>

<div class="main" id="mainContent">
  <div class="loading"><div class="spinner"></div>브리핑 불러오는 중…</div>
</div>

<script>
(async () => {
  const SB = 'https://kpgmmhcdegrjlyddlqth.supabase.co';
  const ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtwZ21taGNkZWdyamx5ZGRscXRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNjkzODMsImV4cCI6MjA5Njg0NTM4M30.2_duVRRmH-Y4UYfhHvJYEsEZdwmKeKlOEWNvaWW2eWc';
  const hdr = { apikey: ANON, Authorization: 'Bearer ' + ANON };
  const params = new URLSearchParams(location.search);
  const main = document.getElementById('mainContent');

  function colorClass(c) {
    if (!c) return '';
    if (c === 'green') return 'color:var(--green)';
    if (c === 'red') return 'color:var(--red)';
    if (c === 'blue') return 'color:var(--accent)';
    if (c === 'yellow') return 'color:var(--yellow)';
    return '';
  }

  function changeClass(val) {
    if (!val) return 'flat';
    const s = String(val);
    if (s.startsWith('+') || (parseFloat(s) > 0)) return 'up';
    if (s.startsWith('-') || (parseFloat(s) < 0)) return 'down';
    return 'flat';
  }

  function tagLabel(level) {
    if (level === 'hot') return '🔥 HOT';
    if (level === 'warm') return '⚡ WARM';
    if (level === 'cold') return '❄️ COLD';
    return '🌿 MILD';
  }

  function getDayType(briefDate) {
    // brief_date is YYYY-MM-DD in KST
    const d = new Date(briefDate + 'T12:00:00+09:00');
    const dow = d.getDay(); // 0=Sun, 6=Sat
    if (dow === 6) return 'saturday';
    if (dow === 0) return 'sunday';
    return 'weekday';
  }

  function render(d) {
    const isPremarket = d.session === 'premarket';
    const dayType = getDayType(d.brief_date);
    const isSaturday = dayType === 'saturday';
    const isSunday = dayType === 'sunday';
    const isWeekend = isSaturday || isSunday;

    // Session label
    let sessionLabel, sessionClass;
    if (isWeekend) {
      sessionLabel = isSaturday ? '📊 주간 브리핑' : '📋 주간 프리뷰';
      sessionClass = 'weekend';
    } else {
      const SL={premarket:'📈 장전 브리핑',open:'🔔 장초반 브리핑',afternoon:'☀️ 장후반 브리핑',close:'🌆 장마감 브리핑'};
      sessionLabel=SL[d.session]||'📋 브리핑';
      sessionClass = d.session;
    }

    const dateKr = d.brief_date ? d.brief_date.replace(/(\d{4})-(\d{2})-(\d{2})/, '$1년 $2월 $3일') : '';

    const dateBadge = document.getElementById('dateBadge');
    dateBadge.textContent = dateKr;
    dateBadge.style.display = 'inline-block';
    const sessionBadge = document.getElementById('sessionBadge');
    sessionBadge.textContent = sessionLabel;
    sessionBadge.className = 'session-badge ' + sessionClass;
    sessionBadge.style.display = 'inline-block';

    const chips = document.getElementById('chipsRow');
    chips.innerHTML = (d.indices || []).map(idx =>
      `<div class="chip ${idx.color||''}"><span class="dot"></span><span style="${colorClass(idx.color)};font-weight:600">${idx.label}</span>&nbsp;${idx.value}</div>`
    ).join('');

    let html = '';

    // Summary card
    let summaryTitle;
    if (isSaturday) summaryTitle = '이번 주 시장 결산';
    else if (isSunday) summaryTitle = '다음 주 시장 전망';
    else summaryTitle = (d.session==='close'||d.session==='afternoon') ? '오늘의 시장 결산' : '오늘의 시장 전망';
    html += `<div class="summary-card"><h2>📊 ${summaryTitle}</h2><p>${(d.summary||'').replace(/\n/g,'<br>')}</p></div>`;

    // US market section (weekday premarket + saturday)
    if (d.us_market && (dayType === 'weekday' || isSaturday)) {
      const us = d.us_market;
      const usLabel = isSaturday ? '미국 증시 마감 (금요일 ' + (us.date||'') + ')' : '미국 증시 마감 (' + (us.date||'') + ')';
      html += `<div class="section-header">🌃 ${usLabel}</div>`;
      html += `<div class="us-card">`;
      if (us.indices && us.indices.length) html += `<div class="us-indices">` + us.indices.map(i => `<div class="us-index"><div class="name">${i.name}</div><div class="val ${changeClass(i.change)}">${i.change||''}</div></div>`).join('') + `</div>`;
      if (us.sectors && us.sectors.length) html += `<div class="us-sectors">` + us.sectors.map(s => `<div class="us-sector ${s.direction==='up'?'up':'down'}"><span class="arrow">${s.direction==='up'?'▲':'▼'}</span>${s.name}<span style="color:var(--muted);font-size:11px;margin-left:4px">${s.reason||''}</span></div>`).join('') + `</div>`;
      if (us.stocks && us.stocks.length) html += `<div class="us-stocks">` + us.stocks.map(s => `<div class="us-stock"><span style="font-weight:700">${s.name}</span> <span class="change ${changeClass(s.change)}">${s.change||''}</span> <span style="color:var(--muted);font-size:11px">${s.reason||''}</span></div>`).join('') + `</div>`;
      if (us.kr_links && us.kr_links.length) html += `<div class="kr-links">` + us.kr_links.map(l => `<div class="kr-link-item"><strong>${l.sector}</strong> — ${l.desc}</div>`).join('') + `</div>`;
      html += `</div>`;
    }

    // Themes section
    if (d.themes && d.themes.length) {
      let themesHeader;
      if (isSaturday) themesHeader = '📋 주간 섹터 이슈 & 다음 주 주목 포인트';
      else if (isSunday) themesHeader = '📋 다음 주 주목 이슈';
      else themesHeader = `🔥 섹터별 전망 (${d.themes.length}개)`;
      html += `<div class="section-header">${themesHeader}</div>`;
      const levelOrder = {hot:0, warm:1, mild:2, cold:3};
      const sorted = [...d.themes].sort((a,b) => (levelOrder[a.level]||2) - (levelOrder[b.level]||2));

      const TICKERS={'삼성전자':'005930','SK하이닉스':'000660','LG에너지솔루션':'373220','삼성바이오로직스':'207940','현대차':'005380','기아':'000270','NAVER':'035420','네이버':'035420','카카오':'035720','셀트리온':'068270','POSCO홀딩스':'005490','포스코홀딩스':'005490','KB금융':'105560','삼성물산':'028260','현대모비스':'012330','신한지주':'055550','삼성생명':'032830','SK텔레콤':'017670','하나금융지주':'086790','카카오뱅크':'323410','삼성SDI':'006400','우리금융지주':'316140','KT&G':'033780','LG화학':'051910','LG전자':'066570','한국전력':'015760','SK이노베이션':'096770','현대건설':'000720','삼성화재':'000810','대한항공':'003490','KT':'030200','GS':'078930','에코프로비엠':'247540','에코프로':'086520','포스코퓨처엠':'003670','엘앤에프':'066970','DB하이텍':'000990','솔브레인':'357780','한미반도체':'042700','HPSP':'403870','원익IPS':'240810','이오테크닉스':'039030','파크시스템스':'140860','심텍':'222800','한화에어로스페이스':'012450','현대로템':'064350','LIG넥스원':'079550','한화시스템':'272210','HD한국조선해양':'009540','HD현대중공업':'329180','삼성중공업':'010140','한화오션':'042660','알테오젠':'196170','HLB':'028300','한미약품':'128940','유한양행':'000100','셀트리온헬스케어':'091990','휴젤':'145020','클래시스':'214150','파마리서치':'214450','메디톡스':'086900','리가켐바이오':'141080','크래프톤':'259960','펄어비스':'263750','엔씨소프트':'036570','카카오게임즈':'293490','넷마블':'251270','SK스퀘어':'402340','카카오페이':'377300','하이브':'352820','SM':'041510','JYP Ent.':'035900','JYP엔터테인먼트':'035900','YG엔터테인먼트':'122870','HD현대일렉트릭':'267260','LS일렉트릭':'010120','효성중공업':'298040','두산로보틱스':'454910','레인보우로보틱스':'277810','GS건설':'006360','대우건설':'047040','삼성엔지니어링':'028050','현대제철':'004020','고려아연':'010130','풍산':'103140','이마트':'139480','BGF리테일':'282330','현대백화점':'069960','신세계':'004170','CJ제일제당':'097950','오리온':'271560','농심':'004370','삼양식품':'003230','하이트진로':'000080','SK':'034730','LG':'003550','두산에너빌리티':'034020','메리츠금융지주':'138040','키움증권':'039490','미래에셋증권':'006800','NH투자증권':'005940','삼성증권':'016360','아시아나항공':'020560','진에어':'272450','제주항공':'089590','HD현대':'267250','한국항공우주':'047810','S-Oil':'010950','S오일':'010950','롯데케미칼':'011170','금호석유화학':'011780','현대글로비스':'086280'};
      const stockUrl=s=>TICKERS[s]?`https://finance.naver.com/item/main.naver?code=${TICKERS[s]}`:`https://finance.naver.com/search/searchResult.nhn?query=${encodeURIComponent(s)}`;
      const renderRow = t => { const [nm,sb]=(t.name||'').split('('); const sub=sb?sb.replace(')','').trim():''; return `<div class="theme-row ${t.level||'mild'}"><div class="theme-row-left"><span class="theme-row-name">${nm.trim()}</span>${sub?`<span class="theme-row-sub">${sub}</span>`:''}<span class="theme-tag">${tagLabel(t.level)}</span></div><div class="theme-row-right"><div class="theme-row-reason">${t.reason||''}</div><div class="theme-row-stocks">${(t.stocks||[]).map(s=>`<a href="${stockUrl(s)}" target="_blank" rel="noopener" class="stock-tag">${s}</a>`).join('')}</div></div></div>`; };

      const coldThemes = sorted.filter(t => t.level === 'cold');
      const nonCold = sorted.filter(t => t.level !== 'cold');
      const LIMIT = 8;
      const mainCards = nonCold.slice(0, LIMIT);
      const moreCards = nonCold.slice(LIMIT);

      html += `<div class="themes-list">` + mainCards.map(renderRow).join('') + coldThemes.map(renderRow).join('') + `</div>`;

      if (moreCards.length) {
        html += `<button class="themes-more-btn" onclick="this.style.display='none';document.getElementById('themes-more').style.display='flex'">+ 더 보기 (${moreCards.length}개 더)</button>`;
        html += `<div class="themes-list" id="themes-more" style="display:none">` + moreCards.map(renderRow).join('') + `</div>`;
      }
    }

    // News
    if (d.news && d.news.length) {
      const newsHeader = isWeekend ? '📰 주간 주요 뉴스' : '📰 주요 뉴스';
      html += `<div class="section-header">${newsHeader}</div>`;
      html += `<div class="news-list">` + d.news.map((n, i) =>
        `<div class="news-item">
          <div class="news-num">${i+1}</div>
          <div class="news-body">
            <div class="news-title">${n.link ? `<a href="${n.link}" target="_blank" rel="noopener">${n.title||''}</a>` : (n.title||'')}</div>
            <div class="news-meta"><span class="news-tag">${n.tag||'뉴스'}</span><span class="news-time">${n.time||''}</span></div>
          </div>
        </div>`
      ).join('') + `</div>`;
    }

    // Outlook + risks
    if (d.outlook || (d.risks && d.risks.length)) {
      const outlookHeader = isWeekend ? '🔭 다음 주 주요 관심 사항' : '🔭 전망 및 리스크';
      html += `<div class="section-header">${outlookHeader}</div>`;
      html += `<div class="outlook-card">`;
      if (d.outlook) html += `<div class="outlook-text">${d.outlook.replace(/\n/g,'<br>')}</div>`;
      if (d.risks && d.risks.length) html += `<div class="risks">` + d.risks.map(r=>`<span class="risk-item">⚠ ${r}</span>`).join('') + `</div>`;
      html += `</div>`;
    }

    html += `<div class="disclaimer">⚠️ 이 브리핑은 Naver 뉴스를 기반으로 AI가 자동 생성한 참고 자료입니다. 투자 권유가 아니며, 최종 투자 판단은 본인에게 있습니다. 주식 투자에는 원금 손실 위험이 있습니다.</div>`;
    html += `<div class="footer">kkangdago.com · AI 자동 생성 · 투자는 본인 책임</div>`;
    _cSel = d.brief_date;
    main.innerHTML = html;
  }

  // Calendar state
  let _availDates = {}, _calY = new Date().getFullYear(), _calM = new Date().getMonth(), _cSel = null;
  function _buildCal() {
    const popup = document.getElementById('calPopup');
    if (!popup) return;
    const y = _calY, m = _calM;
    const mn = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
    const dn = ['일','월','화','수','목','금','토'];
    const first = new Date(y,m,1), last = new Date(y,m+1,0), sdow = first.getDay();
    const todayStr = new Date().toLocaleDateString('sv-SE',{timeZone:'Asia/Seoul'});
    let ch = '<div class="cal-hdr"><button class="cal-nav" id="calPrev">&#8249;</button><span>'+y+'년 '+mn[m]+'</span><button class="cal-nav" id="calNext">&#8250;</button></div><div class="cal-grid">';
    ch += dn.map((d,i)=>'<div class="cal-dow" style="'+(i===0?'color:#ef4444':i===6?'color:#60a5fa':'')+'">'+d+'</div>').join('');
    for(let i=0;i<sdow;i++) ch+='<div></div>';
    for(let d=1;d<=last.getDate();d++){
      const ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      const av=_availDates[ds];
      const cls='cal-day'+(av?' avail':'')+(ds===todayStr?' today':'')+(ds===_cSel?' active':'');
      ch+=av?'<div class="'+cls+'" data-d="'+ds+'">'+d+'</div>':'<div class="'+cls+'">'+d+'</div>';
    }
    ch+='</div>';
    if(_cSel&&_availDates[_cSel]){
      const SL={premarket:'📈 장전 08:10',open:'🔔 장초반 10:00',afternoon:'☀️ 장후반 14:00',close:'🌆 장마감 15:30'};
      const SO={premarket:0,open:1,afternoon:2,close:3};
      const sess=[..._availDates[_cSel]].sort((a,b)=>(SO[a.session]||0)-(SO[b.session]||0));
      ch+='<div class="cal-sessions">'+sess.map(r=>'<button class="cal-session-btn" data-s="'+r.session+'">'+(SL[r.session]||r.session)+'</button>').join('')+'</div>';
    }
    popup.innerHTML = ch;
    popup.querySelectorAll('.cal-day[data-d]').forEach(el=>{el.onclick=()=>window._calPick(el.dataset.d);});
    const pv=popup.querySelector('#calPrev'); if(pv) pv.onclick=window._calPrev;
    const nx=popup.querySelector('#calNext'); if(nx) nx.onclick=window._calNext;
    popup.querySelectorAll('.cal-session-btn').forEach(el=>{el.onclick=()=>{location.href='/?date='+_cSel+'&session='+el.dataset.s;};});
  }
  window._calPrev=()=>{if(_calM===0){_calM=11;_calY--;}else{_calM--;}_buildCal();};
  window._calNext=()=>{if(_calM===11){_calM=0;_calY++;}else{_calM++;}_buildCal();};
  window._calPick=d=>{_cSel=d;_buildCal();};
  window.toggleCal=e=>{if(e)e.stopPropagation();const p=document.getElementById('calPopup');if(p){p.classList.toggle('open');if(p.classList.contains('open'))_buildCal();}};
  document.addEventListener('click',e=>{const p=document.getElementById('calPopup');if(p&&p.classList.contains('open')&&!p.contains(e.target)&&e.target!==document.getElementById('dateBadge'))p.classList.remove('open');});

  async function loadHistory(){
    try{
      const r=await fetch(`${SB}/rest/v1/briefings?market=eq.KR&select=brief_date,session&order=brief_date.desc&limit=60`,{headers:hdr});
      const rows=await r.json();
      if(!rows||!rows.length)return;
      rows.forEach(row=>{if(!_availDates[row.brief_date])_availDates[row.brief_date]=[];_availDates[row.brief_date].push(row);});
      const lDate=rows[0].brief_date.split('-').map(Number);
      _calY=lDate[0];_calM=lDate[1]-1;
    }catch(e){}
  }

  try {
    let url;
    const date = params.get('date');
    const session = params.get('session') || 'premarket';
    if (date) {
      url = `${SB}/rest/v1/briefings?brief_date=eq.${date}&session=eq.${session}&market=eq.KR&limit=1`;
    } else {
      url = `${SB}/rest/v1/briefings?market=eq.KR&order=brief_date.desc&limit=8`;
    }
    const r = await fetch(url, { headers: hdr });
    const rows = await r.json();
    if (!rows || !rows.length) {
      main.innerHTML = '<div class="error-box">아직 브리핑 데이터가 없습니다.<br>다음 브리핑 생성 후 다시 확인해주세요.</div>';
    } else {
      if (date) {
        render(rows[0]);
      } else {
        const latestDate = rows[0].brief_date;
        const S_ORD={premarket:0,open:1,afternoon:2,close:3};
        const latest=rows.filter(rx=>rx.brief_date===latestDate).sort((a,b)=>(S_ORD[b.session]||0)-(S_ORD[a.session]||0))[0];
        render(latest);
      }
    }
  } catch(e) {
    main.innerHTML = `<div class="error-box">데이터를 불러오지 못했습니다.<br><small>${e.message}</small></div>`;
  }
  loadHistory();
})();
</script>
