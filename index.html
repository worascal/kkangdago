<script>
(async () => {
  const SB = 'https://kpgmmhcdegrjlyddlqth.supabase.co';
  const ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtwZ21taGNkZWdyamx5ZGRscXRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNjkzODMsImV4cCI6MjA5Njg0NTM4M30.2_duVRRmH-Y4UYfhHvJYEsEZdwmKeKlOEWNvaWW2eWc';
  const hdr = { apikey: ANON, Authorization: 'Bearer ' + ANON };
  const params = new URLSearchParams(location.search);
  const main = document.getElementById('mainContent');

  function colorClass(c) {
    if (!c) return '';
    if (c === 'green') return 'color:var(--green)';
    if (c === 'red') return 'color:var(--red)';
    if (c === 'blue') return 'color:var(--accent)';
    if (c === 'yellow') return 'color:var(--yellow)';
    return '';
  }

  function changeClass(val) {
    if (!val) return 'flat';
    const s = String(val);
    if (s.startsWith('+') || (parseFloat(s) > 0)) return 'up';
    if (s.startsWith('-') || (parseFloat(s) < 0)) return 'down';
    return 'flat';
  }

  function tagLabel(level) {
    if (level === 'hot') return '冒聼聰楼 HOT';
    if (level === 'warm') return '芒職隆 WARM';
    if (level === 'mild') return '冒聼聦驴 MILD';
    return '冒聼搂聤 COLD';
  }

  function getDayType(briefDate) {
    // brief_date is YYYY-MM-DD in KST
    const d = new Date(briefDate + 'T12:00:00+09:00');
    const dow = d.getDay(); // 0=Sun, 6=Sat
    if (dow === 6) return 'saturday';
    if (dow === 0) return 'sunday';
    return 'weekday';
  }

  function render(d) {
    const isPremarket = d.session === 'premarket';
    const dayType = getDayType(d.brief_date);
    const isSaturday = dayType === 'saturday';
    const isSunday = dayType === 'sunday';
    const isWeekend = isSaturday || isSunday;

    // Session label
    let sessionLabel, sessionClass;
    if (isWeekend) {
      sessionLabel = isSaturday ? '冒聼聯聤 矛拢录锚掳聞 毛赂聦毛娄卢铆聲聭' : '冒聼聯聥 矛拢录锚掳聞 铆聰聞毛娄卢毛路掳';
      sessionClass = 'weekend';
    } else {
      const SL={premarket:'冒聼聯聢 矛聻楼矛聽聞 毛赂聦毛娄卢铆聲聭',open:'冒聼聰聰 矛聻楼矛麓聢毛掳聵 毛赂聦毛娄卢铆聲聭',afternoon:'芒聵聙茂赂聫 矛聻楼铆聸聞毛掳聵 毛赂聦毛娄卢铆聲聭',close:'冒聼聦聠 矛聻楼毛搂聢锚掳聬 毛赂聦毛娄卢铆聲聭'};
      sessionLabel=SL[d.session]||'冒聼聯聥 毛赂聦毛娄卢铆聲聭';
      sessionClass = d.session;
    }

    const dateKr = d.brief_date ? d.brief_date.replace(/(\d{4})-(\d{2})-(\d{2})/, '$1毛聟聞 $2矛聸聰 $3矛聺录') : '';

    const dateBadge = document.getElementById('dateBadge');
    dateBadge.textContent = dateKr;
    dateBadge.style.display = 'inline-block';
    const sessionBadge = document.getElementById('sessionBadge');
    sessionBadge.textContent = sessionLabel;
    sessionBadge.className = 'session-badge ' + sessionClass;
    sessionBadge.style.display = 'inline-block';

    const chips = document.getElementById('chipsRow');
    chips.innerHTML = (d.indices || []).map(idx =>
      `<div class="chip ${idx.color||''}"><span class="dot"></span><span style="${colorClass(idx.color)};font-weight:600">${idx.label}</span>&nbsp;${idx.value}</div>`
    ).join('');

    let html = '';

    // Summary card
    let summaryTitle;
    if (isSaturday) summaryTitle = '矛聺麓毛虏聢 矛拢录 矛聥聹矛聻楼 锚虏掳矛聜掳';
    else if (isSunday) summaryTitle = '毛聥陇矛聺聦 矛拢录 矛聥聹矛聻楼 矛聽聞毛搂聺';
    else summaryTitle = (d.session==='close'||d.session==='afternoon') ? '矛聵陇毛聤聵矛聺聵 矛聥聹矛聻楼 锚虏掳矛聜掳' : '矛聵陇毛聤聵矛聺聵 矛聥聹矛聻楼 矛聽聞毛搂聺';
    html += `<div class="summary-card"><h2>冒聼聯聤 ${summaryTitle}</h2><p>${(d.summary||'').replace(/\n/g,'<br>')}</p></div>`;

    // US market section (weekday premarket + saturday)
    if (d.us_market && (dayType === 'weekday' || isSaturday)) {
      const us = d.us_market;
      const usLabel = isSaturday ? '毛炉赂锚碌颅 矛娄聺矛聥聹 毛搂聢锚掳聬 (锚赂聢矛職聰矛聺录 ' + (us.date||'') + ')' : '毛炉赂锚碌颅 矛娄聺矛聥聹 毛搂聢锚掳聬 (' + (us.date||'') + ')';
      html += `<div class="section-header">冒聼聦聝 ${usLabel}</div>`;
      html += `<div class="us-card">`;
      if (us.indices && us.indices.length) html += `<div class="us-indices">` + us.indices.map(i => `<div class="us-index"><div class="name">${i.name}</div><div class="val ${changeClass(i.change)}">${i.change||''}</div></div>`).join('') + `</div>`;
      if (us.sectors && us.sectors.length) html += `<div class="us-sectors">` + us.sectors.map(s => `<div class="us-sector ${s.direction==='up'?'up':'down'}"><span class="arrow">${s.direction==='up'?'芒聳虏':'芒聳录'}</span>${s.name}<span style="color:var(--muted);font-size:11px;margin-left:4px">${s.reason||''}</span></div>`).join('') + `</div>`;
      if (us.stocks && us.stocks.length) html += `<div class="us-stocks">` + us.stocks.map(s => `<div class="us-stock"><span style="font-weight:700">${s.name}</span> <span class="change ${changeClass(s.change)}">${s.change||''}</span> <span style="color:var(--muted);font-size:11px">${s.reason||''}</span></div>`).join('') + `</div>`;
      if (us.kr_links && us.kr_links.length) html += `<div class="kr-links">` + us.kr_links.map(l => `<div class="kr-link-item"><strong>${l.sector}</strong> 芒聙聰 ${l.desc}</div>`).join('') + `</div>`;
      html += `</div>`;
    }

    // Themes section
    if (d.themes && d.themes.length) {
      let themesHeader;
      if (isSaturday) themesHeader = '冒聼聯聥 矛拢录锚掳聞 矛聞鹿铆聞掳 矛聺麓矛聤聢 & 毛聥陇矛聺聦 矛拢录 矛拢录毛陋漏 铆聫卢矛聺赂铆聤赂';
      else if (isSunday) themesHeader = '冒聼聯聥 毛聥陇矛聺聦 矛拢录 矛拢录毛陋漏 矛聺麓矛聤聢';
      else themesHeader = `冒聼聰楼 矛聞鹿铆聞掳毛鲁聞 矛聽聞毛搂聺 (${d.themes.length}锚掳聹)`;
      html += `<div class="section-header">${themesHeader}</div>`;
