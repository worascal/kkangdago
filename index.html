<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="naver-site-verification" content="b7206b63777faac34e0ee12c6dba74ae9ca18c40">
<meta name="google-adsense-account" content="ca-pub-2869718539906266">
<meta property="og:type" content="website">
<meta property="og:title" content="лҚ°мқјлҰ¬ к№ЎлӢӨкі  вҖ“ мһҘм „/мһҘл§Ҳк°җ лёҢлҰ¬н•‘">
<meta property="og:description" content="AIк°Җ л§Өмқј л¶„м„қн•ҳлҠ” н•ңкөӯ мЈјмӢқмӢңмһҘ лёҢлҰ¬н•‘. к№ЎлӢӨкө¬ мһҲкІҢ.">
<meta property="og:image" content="https://www.kkangdago.com/preview/latest.png">
<meta property="og:url" content="https://www.kkangdago.com">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://www.kkangdago.com/preview/latest.png">
<title>лҚ°мқјлҰ¬ к№ЎлӢӨкі  вҖ“ лёҢлҰ¬н•‘</title>
<style>
:root{--bg:#0b1919;--surface:#102424;--surface2:#183030;--accent:#00d4b8;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--text:#e2e8f0;--muted:#7a9898;--hot:#ef4444;--warm:#f59e0b;--mild:#22c55e}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;min-height:100vh}
a{color:inherit;text-decoration:none}
.header{background:linear-gradient(135deg,#071818 0%,#102424 60%,#0b1919 100%);padding:24px 20px 18px;border-bottom:1px solid #1a3030}
.header-inner{max-width:900px;margin:0 auto}
.logo{font-size:22px;font-weight:800;color:#fff;letter-spacing:-1px}
.logo span{color:var(--accent)}
.kr-badge{background:rgba(0,212,184,0.15);border:1px solid rgba(0,212,184,0.3);color:var(--accent);font-size:10px;font-weight:800;padding:2px 6px;border-radius:4px;letter-spacing:1px;margin-left:6px;align-self:center}
.date-badge{background:var(--accent);color:#0b1919;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;display:inline-block;margin-left:10px}
.session-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;display:inline-block;margin-left:6px}
.session-badge.premarket{background:rgba(0,212,184,0.15);color:var(--accent);border:1px solid rgba(0,212,184,0.3)}
.session-badge.close{background:rgba(245,158,11,0.15);color:var(--yellow);border:1px solid rgba(245,158,11,0.3)}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.chip{background:var(--surface2);border:1px solid #224040;border-radius:6px;padding:4px 12px;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px}
.chip .dot{width:7px;height:7px;border-radius:50%}
.chip.green .dot{background:var(--green)}
.chip.red .dot{background:var(--red)}
.chip.yellow .dot{background:var(--yellow)}
.chip.blue .dot{background:var(--accent)}
.date-nav{margin-top:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;border-top:1px solid #1a3030;padding-top:12px}
.date-nav-label{font-size:11px;color:var(--muted);white-space:nowrap}
.date-pills{display:flex;gap:5px;flex-wrap:wrap}
.date-pill{background:var(--surface2);border:1px solid #224040;border-radius:5px;padding:3px 10px;font-size:12px;color:var(--muted);cursor:pointer;text-decoration:none;transition:all .15s}
.date-pill:hover{background:#183030;color:var(--text)}
.date-pill.active{background:var(--accent);border-color:var(--accent);color:#0b1919;font-weight:600}
.main{max-width:900px;margin:0 auto;padding:20px}
.summary-card{background:linear-gradient(135deg,#0d2828,#102424);border:1px solid #1e4040;border-radius:12px;padding:18px 20px;margin-bottom:24px}
.summary-card h2{font-size:13px;color:var(--accent);font-weight:700;margin-bottom:8px;letter-spacing:1px;text-transform:uppercase}
.summary-card p{font-size:14px;line-height:1.7;color:var(--text)}
.section-header{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-header::after{content:'';flex:1;height:1px;background:#1a3030}
.us-card{background:var(--surface);border:1px solid #1a3030;border-radius:12px;padding:16px 18px;margin-bottom:24px}
.us-indices{display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap}
.us-index{background:var(--surface2);border-radius:8px;padding:8px 14px;font-size:13px}
.us-index .name{color:var(--muted);font-size:11px;margin-bottom:2px}
.us-index .val{font-weight:700}
.us-index .val.up{color:var(--green)}
.us-index .val.down{color:var(--red)}
.us-index .val.flat{color:var(--muted)}
.us-sectors{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.us-sector{background:var(--surface2);border-radius:6px;padding:5px 12px;font-size:12px;display:flex;align-items:center;gap:5px}
.us-sector .arrow{font-size:11px}
.us-sector.up .arrow{color:var(--green)}
.us-sector.down .arrow{color:var(--red)}
.us-stocks{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.us-stock{background:var(--surface2);border:1px solid #224040;border-radius:6px;padding:5px 12px;font-size:12px}
.us-stock .change{font-weight:700}
.us-stock .change.up{color:var(--green)}
.us-stock .change.down{color:var(--red)}
.kr-links{border-top:1px solid #1a3030;padding-top:10px}
.kr-link-item{font-size:12px;color:var(--muted);margin-bottom:5px;padding-left:10px;border-left:2px solid var(--accent)}
.themes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:28px}
.theme-card{background:var(--surface);border:1px solid #1a3030;border-radius:10px;padding:14px 16px;border-top-width:3px}
.theme-card.hot{border-top-color:var(--hot)}
.theme-card.warm{border-top-color:var(--warm)}
.theme-card.mild{border-top-color:var(--mild)}
.theme-name{font-size:14px;font-weight:700;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center}
.theme-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:.5px}
.hot .theme-tag{background:rgba(239,68,68,.15);color:var(--hot)}
.warm .theme-tag{background:rgba(245,158,11,.15);color:var(--warm)}
.mild .theme-tag{background:rgba(34,197,94,.15);color:var(--mild)}
.theme-reason{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:8px}
.theme-stocks{display:flex;flex-wrap:wrap;gap:5px}
.stock-tag{background:var(--surface2);border:1px solid #224040;border-radius:4px;font-size:11px;padding:2px 8px;color:var(--text)}
.news-list{background:var(--surface);border:1px solid #1a3030;border-radius:10px;overflow:hidden;margin-bottom:28px}
.news-item{padding:12px 16px;border-bottom:1px solid #0f2a2a;display:flex;align-items:flex-start;gap:10px}
.news-item:last-child{border-bottom:none}
.news-item:hover{background:rgba(0,212,184,.05)}
.news-num{font-size:12px;color:var(--muted);width:20px;flex-shrink:0;padding-top:2px}
.news-body{flex:1}
.news-title{font-size:13px;color:var(--text);line-height:1.4}
.news-title a{color:var(--text)}
.news-title a:hover{color:var(--accent)}
.news-meta{display:flex;align-items:center;gap:8px;margin-top:4px;flex-wrap:wrap}
.news-tag{font-size:10px;padding:1px 6px;border-radius:3px;background:rgba(0,212,184,.15);color:var(--accent)}
.news-time{font-size:11px;color:var(--muted)}
.outlook-card{background:var(--surface);border:1px solid #1a3030;border-radius:10px;padding:16px 18px;margin-bottom:24px}
.outlook-text{font-size:14px;line-height:1.7;color:var(--text);margin-bottom:12px}
.risks{display:flex;flex-wrap:wrap;gap:8px}
.risk-item{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#f87171;font-size:12px;padding:4px 12px;border-radius:20px}
.disclaimer{background:var(--surface);border:1px solid #1a3030;border-radius:8px;padding:12px 16px;margin-bottom:20px;font-size:11px;color:var(--muted);line-height:1.6}
.footer{text-align:center;padding:16px;font-size:11px;color:#3a6060;border-top:1px solid #0f2a2a}
.loading{text-align:center;padding:60px 20px;color:var(--muted);font-size:15px}
.loading .spinner{width:32px;height:32px;border:3solid #1a3030;border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
`.error-box{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:10px;padding:20px;margin:40px auto;max-width:500px;text-align:center;color:#f87171}
@media(max-width:600px){.themes-grid{grid-template-columns:1fr}.us-indices{gap:8px}}
</style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <div style="display:flex;align-items:center;flex-wrap:wrap;gap:6px">
      <span class="logo">Daily <span>kkangdago</span></span><span class="kr-badge">KR</span>
      <span id="dateBadge" class="date-badge" style="display:none"></span>
      <span id="sessionBadge" class="session-badge" style="display:none"></span>
    </div>
    <div id="chipsRow" class="chips"></div>
    <div class="date-nav">
      <span class="date-nav-label">рҹ“… нһҲмҠӨнҶ лҰ¬</span>
      <div id="dateList" class="date-pills"><span style="font-size:12px;color:#3a6060">лЎңл”© мӨ‘вҖҰ</span></div>
    </div>
  </div>
</div>

<div class="main" id="mainContent">
  <div class="loading"><div class="spinner"></div>лёҢлҰ¬н•‘ л¶Ҳлҹ¬мҳӨлҠ” мӨ‘вҖҰ</div>
</div>

<script>
(async () => {
  const SB = 'https://kpgmmhcdegrjlyddlqth.supabase.co';
  const ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtwZ21taGNkZWdyamx5ZGRscXRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNjkzODMsImV4cCI6MjA5Njg0NTM4M30.2_duVRRmH-Y4UYfhHvJYEsEZdwmKeKlOEWNvaWW2eWc';
  const hdr = { apikey: ANON, Authorization: 'Bearer ' + ANON };
  const params = new URLSearchParams(location.search);
  const main = document.getElementById('mainContent');

  function colorClass(c) {
    if (!c) return '';
    if (c === 'green') return 'color:var(--green)';
    if (c === 'red') return 'color:var(--red)';
    if (c === 'blue') return 'color:var(--accent)';
    if (c === 'yellow') return 'color:var(--yellow)';
    return '';
  }

  function changeClass(val) {
    if (!val) return 'flat';
    const s = String(val);
    if (s.startsWith('+') || (parseFloat(s) > 0)) return 'up';
    if (s.startsWith('-') || (parseFloat(s) < 0)) return 'down';
    return 'flat';
  }

  function tagLabel(level) {
    if (level === 'hot') return 'рҹ”Ҙ HOT';
    if (level === 'warm') return 'вҡЎ WARM';
    return 'рҹҢҝ MILD';
  }

  function render(d) {
    const isPremarket = d.session === 'premarket';
    const sessionLabel = isPremarket ? 'рҹ“Ҳ мһҘм „ лёҢлҰ¬н•‘' : 'рҹҢҶ мһҘл§Ҳк°җ лёҢлҰ¬н•‘';
    const dateKr = d.brief_date ? d.brief_date.replace(/(\d{4})-(\d{2})-(\d{2})/, '$1л…„ $2мӣ” $3мқј') : '';

    const dateBadge = document.getElementById('dateBadge');
    dateBadge.textContent = dateKr;
    dateBadge.style.display = 'inline-block';
    const sessionBadge = document.getElementById('sessionBadge');
    sessionBadge.textContent = sessionLabel;
    sessionBadge.className = 'session-badge ' + d.session;
    sessionBadge.style.display = 'inline-block';

    const chips = document.getElementById('chipsRow');
    chips.innerHTML = (d.indices || []).map(idx =>
      `<div class="chip ${idx.color||''}"><span class="dot"></span><span style="${colorClass(idx.color)};font-weight:600">${idx.label}</span>&nbsp;${idx.value}</div>`
    ).join('');

    let html = '';
    html += `<div class="summary-card"><h2>рҹ“Ҡ ${isPremarket ? 'мҳӨлҠҳмқҳ мӢңмһҘ м „л§қ' : 'мҳӨлҠҳмқҳ мӢңмһҘ кІ°мӮ°'}</h2><p>${(d.summary||'').replace(/\n/g,'<br>')}</p></div>`;

    if (isPremarket && d.us_market) {
      const us = d.us_market;
      html += `<div class="section-header">рҹҢғ лҜёкөӯ мҰқ¬Ӣң л§Ҳк°җ (${us.date||''})</div>`;
      html += `<div class="us-card">`;
      if (us.indices && us.indices.length) html += `<div class="us-indices">` + us.indices.map(i => `<div class="us-index"><div class="name">${i.name}</div><div class="val ${changeClass(i.change)}">${i.change||''}</div></div>`).join('') + `</div>`;
      if (us.sectors && us.sectors.length) html += `<div class="us-sectors">` + us.sectors.map(s => `<div class="us-sector ${s.direction==='up'?'up':'down'}"><span class="arrow">${s.direction==='up'?'в–І':'в–ј'}</span>${s.name}<span style="color:var(--muted);font-size:11px;margin-left:4px">${s.reason||''}</span></div>`).join('') + `</div>`;
      if (us.stocks && us.stocks.length) html += `<div class="us-stocks">` + us.stocks.map(s => `<div class="us-stock"><span style="font-weight:700">${s.name}</span> <span class="change ${changeClass(s.change)}">${s.change||''}</span> <span style="color:var(--muted);font-size:11px">${s.reason||''}</span></div>`).join('') + `</div>`;
      if (us.kr_links && us.kr_links.length) html += `<div class="kr-links">` + us.kr_links.map(l => `<div class="kr-link-item"><strong>${l.sector}</strong> вҖ” ${l.desc}</div>`).join('') + `</div>`;
      html += `</div>`;
    }

    if (d.themes && d.themes.length) {
      html += `<div class="section-header">рҹ”Ҙ мЈјмҡ” н…Ңл§Ҳ</div>`;
      html += `<div class="themes-grid">` + d.themes.map(t => `<div class="theme-card ${t.level||'mild'}"><div class="theme-name">${t.name}<span class="theme-tag">${tagLabel(t.level)}</span></div><div class="theme-reason">${t.reason||''}</div><div class="theme-stocks">${(t.stocks||[]).map(s=>`<span class="stock-tag">${s}</span>`).join('')}</div></div>`).join('') + `</div>`;
    }

    if (d.news && d.news.length) {
      html += `<div class="section-header">рҹ“° мЈјмҡ” лүҙмҠӨ</div>`;
      html += `<div class="news-list">` + d.news.map((n,i) => `<div class="news-item"><div class="news-num">${i+1}</div><div class="news-body"><div class="news-title">${n.link?`<a href="${n.link}" target="_blank" rel="noopener">${n.title||''}</a>`:(n.title||'')}</div><div class="news-meta"><span class="news-tag">${n.tag||'лүҙмҠӨ'}</span><span class="news-time">${n.time||''}</span></div></div></div>`).join('') + `</div>`;
    }

    if (d.outlook || (d.risks && d.risks.length)) {
      html += `<div class="section-header">рҹ”ӯ м „л§қ л°Ҹ лҰ¬мҠӨнҒ¬</div>`;
      html += `<div class="outlook-card">`;
      if (d.outlook) html += `<div class="outlook-text">${d.outlook.replace(/\n/g,'<br>')}</div>`;
      if (d.risks && d.risks.length) html += `<div class="risks">` + d.risks.map(r=>`<span class="risk-item">вҡЁ ${r}</span>`).join('') + `</div>`;
      html += `</div>`;
    }

    html += `<div class="disclaimer">вҡ пёҸ мқҙ лёҢлҰ¬н•‘мқҖ Naver лүҙмҠӨлҘј кё°л°ҳмңјлЎң AIк°Җ мһҗлҸҷ мғқм„ұн•ң м°ёкі  мһҗлЈҢмһ…лӢҲлӢӨ. нҲ¬мһҗ к¶Ңмң к°Җ м•„лӢҲл©°, мөңмў… нҲ¬мһҗм—җлҠ” мӣҗкёҲ мҶҗмӢӨ мң„н—ҳмқҙ мһҲмҠөлӢҲлӢӨ.</div>`;
    html += `<div class="footer">kkangdago.com В· AI мһҗлҸҷ мғқм„ұ В· нҲ¬мһҗлҠ” ліёмқё мұ…мһ„</div>`;
    main.innerHTML = html;
  }

  async function loadHistory() {
    try {
      const r = await fetch(`${SB}/rest/v1/briefings?market=eq.KR&select=brief_date,session&order=brief_date.desc&limit=60`, { headers: hdr });
      const rows = await r.json();
      const list = document.getElementById('dateList');
      if (!rows || !rows.length) { list.innerHTML = ''; return; }
      list.innerHTML = '';
      const curDate = params.get('date');
      const curSession = params.get('session');
      rows.forEach(row => {
        const a = document.createElement('a');
        const [,m,day] = (row.brief_date||'').split('-');
        a.textContent = parseInt(m) + '/' + parseInt(day) + (row.session==='close'?'рҹҢҶ':'');
        a.href = `/?date=${row.brief_date}&session=${row.session}`;
        a.className = 'date-pill' + (row.brief_date===curDate&&row.session===curSession?' active':'');
        list.appendChild(a);
      });
    } catch(e) { document.getElementById('dateList').innerHTML = ''; }
  }

  try {
    let url;
    const date = params.get('date');
    const session = params.get('session') || 'premarket';
    if (date) {
      url = `${SB}/rest/v1/briefings?brief_date=eq.${date}&session=eq.${session}&market=eq.KR&limit=1`;
    } else {
      url = `${SB}/rest/v1/briefings?market=eq.KR&order=brief_date.desc,session.asc&limit=1`;
    }
    const r = await fetch(url, { headers: hdr });
    const rows = await r.json();
    if (!rows || !rows.length) {
      main.innerHTML = '<div class="error-box">м•„м§Ғ лёҢлҰ¬н•‘ лҚ°мқҙн„°к°Җ м—ҶмҠөлӢҲлӢӨ.<br>лӢӨмқҢ лёҢлҰ¬н•‘ мғқм„ұ нӣ„ лӢӨмӢң нҷ•мқён•ҙмЈјм„ёмҡ”.</div>';
    } else {
      render(rows[0]);
    }
  } catch(e) {
    main.innerHTML = `<div class="error-box">лҚ°мқҙн„°лҘј л¶Ҳлҹ¬мҳӨм§Җ лӘ»н–ҲмҠөлӢҲлӢӨ.<br><small>${e.message}</small></div>`;
  }
  loadHistory();
})();
</script>
</body>
</html>
