<html lang="ko">
<head>
  <meta charset="UTF-8">

  <title>데일리 깡다고 – 브리핑</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2869718539906266" crossorigin="anonymous"><\/script>
  <style>
    :root{--bg:#0d0d0d;--surface:#161616;--surface2:#1e1e1e;--accent:#00d4aa;--signal:#f0c040;--green:#26a69a;--red:#ef5350;--text:#e2e8f0;--muted:#8892a4;--hot:#ef5350;--warm:#f0c040;--mild:#26a69a}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;min-height:100vh}
    a{color:inherit;text-decoration:none}
    .header{background:linear-gradient(135deg,#0a2b25 0%,#161616 60%,#0d0d0d 100%);padding:28px 20px 20px;border-bottom:1px solid #222}
    .header-inner{max-width:900px;margin:0 auto}
    .header-top{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    .logo{font-size:28px;font-weight:800;color:#fff;letter-spacing:-1px}
    .logo .accent{color:var(--accent)}
    .logo .signal{color:var(--signal);font-size:14px;vertical-align:super}
    .date-badge{background:#1e1e1e;border:1px solid #333;color:#aaa;font-size:13px;font-weight:700;padding:5px 14px;border-radius:20px}
    .brief-toggle{display:flex;gap:8px;margin-left:2px}
    .brief-btn{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:700;padding:5px 15px;border-radius:20px;text-decoration:none;cursor:pointer;transition:opacity .15s;white-space:nowrap}
    .brief-btn.active-open{background:var(--accent);color:#000}
    .brief-btn.active-close{background:var(--signal);color:#000}
    .brief-btn.inactive{background:var(--surface2);color:var(--muted);border:1.5px solid #333}
    .brief-btn.inactive:hover{border-color:var(--accent);color:var(--accent)}
    .brief-btn.disabled{background:var(--surface2);color:#3a3f55;border:1.5px solid #252525;cursor:default;pointer-events:none;opacity:.45}
    .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
    .chip{background:var(--surface2);border:1px solid #333;border-radius:6px;padding:4px 12px;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px}
    .chip .dot{width:7px;height:7px;border-radius:50%}
    .chip.green .dot{background:var(--green)}.chip.red .dot{background:var(--red)}.chip.yellow .dot{background:var(--signal)}.chip.blue .dot{background:var(--accent)}
    .date-nav{margin-top:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;border-top:1px solid #222;padding-top:12px}
    .date-nav-label{font-size:11px;color:var(--muted);white-space:nowrap}
    .date-pills{display:flex;gap:5px;flex-wrap:wrap}
    .date-pill{background:var(--surface2);border:1px solid #333;border-radius:5px;padding:3px 10px;font-size:12px;color:var(--muted);cursor:pointer;transition:all .15s}
    .date-pill:hover{background:#2a2a2a;color:var(--text)}
    .date-pill.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:600}
    .date-pill.today-pill{border-color:var(--accent);color:var(--accent)}
    .main{max-width:900px;margin:0 auto;padding:20px}
    .summary-card{background:linear-gradient(135deg,#14302b,#161616);border:1px solid #1f4a40;border-radius:12px;padding:18px 20px;margin-bottom:24px}
    .summary-card h2{font-size:13px;color:var(--accent);font-weight:700;margin-bottom:8px;letter-spacing:1px;text-transform:uppercase}
    .summary-card p{font-size:14px;line-height:1.7;color:var(--text)}
    .section-header{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
    .section-header::after{content:'';flex:1;height:1px;background:#222}
    .themes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:28px}
    .theme-card{background:var(--surface);border:1px solid #222;border-radius:10px;padding:14px 16px;border-top-width:3px}
    .theme-card.hot{border-top-color:var(--hot)}.theme-card.warm{border-top-color:var(--warm)}.theme-card.mild{border-top-color:var(--mild)}
    .theme-name{font-size:14px;font-weight:700;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center}
    .theme-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:.5px}
    .hot .theme-tag{background:rgba(239,83,80,.15);color:var(--hot)}.warm .theme-tag{background:rgba(240,192,64,.15);color:var(--warm)}.mild .theme-tag{background:rgba(38,166,154,.15);color:var(--mild)}
    .theme-reason{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:8px}
    .theme-stocks{display:flex;flex-wrap:wrap;gap:5px}
    .stock-tag{background:var(--surface2);border:1px solid #333;border-radius:4px;font-size:11px;padding:2px 8px;color:var(--text)}
    .us-recap{background:var(--surface);border:1px solid #222;border-radius:10px;padding:16px 18px;margin-bottom:28px}
    .us-indices{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
    .sector-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:14px}
    .sector-card{background:var(--surface2);border-radius:8px;padding:10px 12px;border-left:3px solid var(--muted)}
    .sector-card.up{border-left-color:var(--green)}.sector-card.down{border-left-color:var(--red)}
    .sector-name{font-size:13px;font-weight:700;margin-bottom:4px}
    .sector-name .arrow.up{color:var(--green)}.sector-name .arrow.down{color:var(--red)}
    .sector-reason{font-size:11.5px;color:var(--muted);line-height:1.5}
    .us-stock-list{border-top:1px solid #222;padding-top:12px;margin-bottom:14px}
    .us-stock-item{display:flex;align-items:baseline;gap:8px;padding:6px 0;font-size:12.5px}
    .us-stock-name{font-weight:700;min-width:90px}
    .us-change{font-weight:700;font-size:12px}
    .us-change.up{color:var(--green)}.us-change.down{color:var(--red)}
    .us-reason{color:var(--muted);flex:1}
    .kr-link-box{border-top:1px solid #222;padding-top:12px}
    .kr-link-title{font-size:11px;color:var(--accent);font-weight:700;margin-bottom:6px;letter-spacing:.5px}
    .kr-link-item{font-size:12.5px;color:var(--text);line-height:1.6;margin-bottom:4px}
    .kr-sector-tag{background:rgba(0,212,170,.12);color:var(--accent);border-radius:4px;padding:1px 6px;font-size:11px;font-weight:700;margin-right:4px}
    .news-section{margin-bottom:28px}
    .news-list{background:var(--surface);border:1px solid #222;border-radius:10px;overflow:hidden}
    .news-item{padding:12px 16px;border-bottom:1px solid #1e1e1e;display:flex;align-items:flex-start;gap:10px}
    .news-item:last-child{border-bottom:none}
    .news-item.market-overview{background:rgba(0,212,170,.05);border-left:3px solid var(--accent)}
    .news-num{font-size:12px;color:var(--muted);width:20px;flex-shrink:0;padding-top:1px}
    .news-body{flex:1}
    .news-title{font-size:13px;color:var(--text);line-height:1.4}
    .news-title a{color:var(--text)}.news-title a:hover{color:var(--accent);text-decoration:underline}
    .news-meta{display:flex;align-items:center;gap:8px;margin-top:4px;flex-wrap:wrap}
    .news-tag{font-size:10px;padding:1px 6px;border-radius:3px}
    .tag-시장{background:rgba(0,212,170,.15);color:var(--accent)}
    .tag-반도체{background:rgba(139,92,246,.15);color:#a78bfa}
    .tag-AI{background:rgba(0,212,170,.15);color:var(--accent)}
    .news-time{font-size:11px;color:var(--muted)}
    .signoff{text-align:center;padding:16px 0 8px;font-size:15px;font-weight:700;color:var(--accent)}
    .disclaimer{background:var(--surface);border:1px solid #222;border-radius:8px;padding:12px 16px;margin-bottom:20px}
    .disclaimer p{font-size:11px;color:var(--muted);line-height:1.6}
    .footer{text-align:center;padding:16px;font-size:11px;color:#555;border-top:1px solid #1e1e1e}
    .empty-state{text-align:center;padding:80px 20px;color:var(--muted)}
    .empty-state h3{font-size:18px;margin-bottom:8px;color:var(--text)}
    @media(max-width:600px){.themes-grid,.sector-grid{grid-template-columns:1fr}.us-stock-item{flex-wrap:wrap}}
  </style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <div class="header-top">
      <div class="logo">Daily <span class="accent">kkang</span>dago <span class="signal">KR</span></div>
      <div class="date-badge" id="hdr-date">—</div>
      <div class="brief-toggle" id="hdr-toggle"></div>
    </div>
    <div class="chips" id="hdr-chips"></div>
    <div class="date-nav">
      <span class="date-nav-label">📅 히스토리</span>
      <div class="date-pills" id="date-pills"><span style="font-size:12px;color:#4a5068">로딩 중…</span></div>
    </div>
  </div>
</div>
<div class="main" id="main-content">
  <div class="empty-state"><h3>로딩 중...</h3><p>잠시만 기다려주세요</p></div>
</div>
<div class="footer"><a href="/about.html" style="color:#888">소개</a> · <a href="/privacy.html" style="color:#888">개인정보처리방침</a><br><br>www.kkangdago.com · 데일리 깡다고 · 투자는 본인 책임</div>

<script>
const SB_URL = 'https://kpgmmhcdegrjlyddlqth.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtwZ21taGNkZWdyamx5ZGRscXRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNjkzODMsImV4cCI6MjA5Njg0NTM4M30.2_duVRRmH-Y4UYfhHvJYEsEZdwmKeKlOEWNvaWW2eWc';
const sbHdr = { apikey: SB_ANON, Authorization: 'Bearer ' + SB_ANON };

const params = new URLSearchParams(location.search);
const today = new Date().toISOString().slice(0,10);
let curDate = params.get('date') || today;
let curSession = params.get('session') || 'premarket';

async function sbGet(path) {
  const r = await fetch(SB_URL + '/rest/v1/' + path, { headers: sbHdr });
  return r.json();
}

function fmtDate(d) {
  const p = d.split('-'); return parseInt(p[1]) + '/' + parseInt(p[2]);
}
function fmtDateKr(d) {
  const p = d.split('-'); return p[0] + '년 ' + parseInt(p[1]) + '월 ' + parseInt(p[2]) + '일';
}
function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }

async function init() {
  const [history] = await Promise.all([
    sbGet('briefings?market=eq.KR&select=brief_date,session&order=brief_date.desc&limit=60'),
    loadBrief(curDate, curSession, history)
  ]);
  renderDatePills(history);
  renderToggle(history, curDate, curSession);
  document.getElementById('hdr-date').textContent = fmtDateKr(curDate);
}

async function loadBrief(date, session, history) {
  const data = await sbGet(`briefings?brief_date=eq.${date}&session=eq.${session}&market=eq.KR&limit=1`);
  renderContent(data[0] || null, session);
  if (history) renderToggle(history, date, session);
}

function renderToggle(history, date, session) {
  const hasOpen = history.some(h => h.brief_date === date && h.session === 'premarket');
  const hasClose = history.some(h => h.brief_date === date && h.session === 'close');
  const openClass = session === 'premarket' ? 'active-open' : (hasOpen ? 'inactive' : 'disabled');
  const closeClass = session === 'close' ? 'active-close' : (hasClose ? 'inactive' : 'disabled');
  document.getElementById('hdr-toggle').innerHTML =
    `<span class="brief-btn ${openClass}" onclick="switchSession('premarket')">☀️ 장전 브리핑</span>
     <span class="brief-btn ${closeClass}" onclick="switchSession('close')">🌆 장마감 브리핑</span>`;
}

function switchSession(s) {
  curSession = s;
  history.replaceState({}, '', '?date=' + curDate + '&session=' + s);
  loadBrief(curDate, s, null);
  document.getElementById('hdr-toggle').querySelectorAll('.brief-btn').forEach(b => {
    b.className = 'brief-btn ' + (b.textContent.includes('장전') ? (s==='premarket'?'active-open':'inactive') : (s==='close'?'active-close':'inactive'));
  });
}

function renderDatePills(history) {
  const dates = [...new Set(history.map(h => h.brief_date))];
  const c = document.getElementById('date-pills');
  c.innerHTML = '';
  const todayPill = document.createElement('span');
  todayPill.className = 'date-pill' + (curDate === today ? ' active' : ' today-pill');
  todayPill.textContent = '오늘';
  todayPill.onclick = () => switchDate(today);
  c.appendChild(todayPill);
  dates.forEach(d => {
    if (d === today) return;
    const span = document.createElement('span');
    span.className = 'date-pill' + (d === curDate ? ' active' : '');
    span.textContent = fmtDate(d);
    span.onclick = () => switchDate(d);
    c.appendChild(span);
  });
}

function switchDate(d) {
  curDate = d;
  history.replaceState({}, '', '?date=' + d + '&session=' + curSession);
  document.getElementById('hdr-date').textContent = fmtDateKr(d);
  document.querySelectorAll('.date-pill').forEach(p => p.classList.remove('active'));
  loadBrief(d, curSession, null);
}

function renderChips(data) {
  if (!data?.indices?.length) { document.getElementById('hdr-chips').innerHTML = ''; return; }
  document.getElementById('hdr-chips').innerHTML = data.indices.map(idx => {
    const cls = idx.color === 'green' ? 'green' : idx.color === 'red' ? 'red' : 'blue';
    return `<div class="chip ${cls}"><span class="dot"></span>${esc(idx.label)} ${esc(idx.value)}</div>`;
  }).join('');
}

function renderContent(data, session) {
  if (!data) {
    document.getElementById('main-content').innerHTML = `<div class="empty-state"><h3>브리핑 준비 중</h3><p>아직 오늘 브리핑이 생성되지 않았습니다.</p></div>`;
    return;
  }
  renderChips(data);
  const us = data.us_market || {};
  const usDate = us.date || '';
  const sessionLabel = session === 'premarket' ? '장전 브리핑' : '장마감 브리핑';
  const themesLabel = session === 'premarket' ? '🔥 주요 테마 분석' : '🔥 오늘 마감 테마 분석';
  
  let html = '';
  
  // 시장 요약
  if (data.summary) {
    html += `<div class="summary-card"><h2>📊 시장 요약</h2><p>${esc(data.summary)}</p></div>`;
  }

  // 미국 증시
  if (us.indices || us.sectors || us.stocks) {
    html += `<div class="section-header">🌃 전일 미국 증시 마감 요약${usDate ? ` <span style="font-size:11px;font-weight:400;color:var(--muted);margin-left:6px">${esc(usDate)} 마감 기준</span>` : ''}</div>
    <div class="us-recap">`;
    if (us.indices?.length) {
      html += '<div class="us-indices">' + us.indices.map(idx => {
        const cls = (idx.change||'').startsWith('+') || (idx.change||'').startsWith('▲') ? 'green' : 'red';
        return `<div class="chip ${cls}"><span class="dot"></span>${esc(idx.name)} ${esc(idx.change)}</div>`;
      }).join('') + '</div>';
    }
    if (us.sectors?.length) {
      html += '<div class="sector-grid">' + us.sectors.map(s => {
        const dir = s.direction === 'up' ? 'up' : 'down';
        const arrow = dir === 'up' ? '▲' : '▼';
        return `<div class="sector-card ${dir}"><div class="sector-name">${esc(s.name)} <span class="arrow ${dir}">${arrow}</span></div><div class="sector-reason">${esc(s.reason)}</div></div>`;
      }).join('') + '</div>';
    }
    if (us.stocks?.length) {
      html += '<div class="us-stock-list">' + us.stocks.map(st => {
        const dir = (st.change||'').startsWith('+') || (st.change||'').startsWith('▲') ? 'up' : 'down';
        return `<div class="us-stock-item"><span class="us-stock-name">${esc(st.name)}</span><span class="us-change ${dir}">${esc(st.change)}</span><span class="us-reason">${esc(st.reason)}</span></div>`;
      }).join('') + '</div>';
    }
    if (us.kr_links?.length) {
      html += '<div class="kr-link-box"><div class="kr-link-title">🔗 관련 한국 섹터 영향</div>' +
        us.kr_links.map(k => `<div class="kr-link-item"><span class="kr-sector-tag">${esc(k.sector)}</span>${esc(k.desc)}</div>`).join('') + '</div>';
    }
    html += '</div>';
  }

  // 테마
  if (data.themes?.length) {
    html += `<div class="section-header">${themesLabel}</div><div class="themes-grid">`;
    html += data.themes.map(t => {
      const level = t.level || t.heat || 'mild';
      const tag = level === 'hot' ? '🔴 급부상' : level === 'warm' ? '🟡 주목' : '🟢 관심';
      return `<div class="theme-card ${level}">
        <div class="theme-name">${esc(t.name)}<span class="theme-tag">${tag}</span></div>
        <div class="theme-reason">${esc(t.reason)}</div>
        <div class="theme-stocks">${(t.stocks||[]).map(s=>`<span class="stock-tag">${esc(s)}</span>`).join('')}</div>
      </div>`;
    }).join('');
    html += '</div>';
  }

  // 뉴스
  if (data.news?.length) {
    html += `<div class="news-section"><div class="section-header">📰 주요 뉴스</div><div class="news-list">`;
    html += data.news.map((n, i) => {
      const cls = i === 0 ? 'news-item market-overview' : 'news-item';
      const tag = n.tag ? `<span class="news-tag tag-${esc(n.tag)}">${esc(n.tag)}</span>` : '';
      const title = n.link
        ? `<a href="${esc(n.link)}" target="_blank" rel="noopener">${esc(n.title)}</a>`
        : esc(n.title);
      return `<div class="${cls}"><div class="news-num">${i+1}</div>
        <div class="news-body"><div class="news-title">${title}</div>
        <div class="news-meta">${tag}${n.time ? `<span class="news-time">${esc(n.time)}</span>` : ''}</div></div></div>`;
    }).join('');
    html += '</div></div>';
  }

  html += '<div class="signoff">오늘의 데일리깡은 여기까지! 👊</div>';
  html += `<div class="disclaimer"><p>⚠️ <strong>투자 유의사항:</strong> 이 브리핑은 Naver 뉴스 감성분석을 기반으로 분석한 시장 정보입니다. 투자 판단의 최종 책임은 본인에게 있으며, 이 자료는 투자 권유나 종목 추천이 아닙니다. 주식 투자에는 원금 손실 위험이 있습니다.</p></div>`;

  document.getElementById('main-content').innerHTML = html;
}

init().catch(e => {
  document.getElementById('main-content').innerHTML = `<div class="empty-state"><h3>오류 발생</h3><p>${e.message}</p></div>`;
});
</script>
</body>
</html>
